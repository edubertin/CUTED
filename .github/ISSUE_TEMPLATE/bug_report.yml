name: Bug
description: Relate um problema reproduzivel no CUTED
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Nao anexe chaves, videos privados, transcricoes, cookies, `.env` ou caminhos pessoais.
  - type: input
    id: version
    attributes:
      label: Versao
      placeholder: "2026.07.17 ou dev"
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows
      placeholder: "Windows 11 24H2"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Resultado esperado
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Resultado observado
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacidade
      options:
        - label: Removi chaves, dados pessoais, caminhos privados e conteudo de videos.
          required: true

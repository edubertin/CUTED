name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

jobs:
  test:
    name: Tests and live timeline build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run Python tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Compile CUTED script
        run: python -m py_compile tools/cutted/scripts/cutted.py

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            prototypes/live-timeline/package-lock.json
            apps/site/package-lock.json

      - name: Install live timeline dependencies
        working-directory: prototypes/live-timeline
        run: npm ci

      - name: Build live timeline library
        working-directory: prototypes/live-timeline
        run: npm run build:lib

      - name: Verify tracked live timeline bundle
        shell: pwsh
        run: |
          $generated = (Get-Content prototypes/live-timeline/dist-lib/live-timeline.js -Raw).Replace("`r`n", "`n")
          $tracked = (Get-Content tools/cutted/assets/live-timeline/live-timeline.js -Raw).Replace("`r`n", "`n")
          if ($generated -ne $tracked) {
            throw "The tracked live timeline bundle is stale. Run npm run build:lib and promote dist-lib/live-timeline.js."
          }

      - name: Install public site dependencies
        working-directory: apps/site
        run: npm ci

      - name: Test public site
        working-directory: apps/site
        run: npm test

      - name: Lint public site
        working-directory: apps/site
        run: npm run lint

      - name: Audit public site dependencies
        working-directory: apps/site
        run: npm audit

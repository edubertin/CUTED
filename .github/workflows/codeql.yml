name: CodeQL

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "17 6 * * 1"

permissions:
  actions: read
  contents: read
  pull-requests: read
  security-events: write

jobs:
  analyze:
    name: Analyze Python and JavaScript
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
        with:
          languages: python,javascript-typescript

      - name: Analyze
        uses: github/codeql-action/analyze@b7351df727350dca84cb9d725d57dcf5bc82ba26 # v3
        with:
          upload: ${{ !github.event.repository.private }}

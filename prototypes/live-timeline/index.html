<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CUTED Live Timeline Prototype</title>
  </head>
  <body>
    <main class="workspace">
      <section class="stage" aria-label="CUTED live timeline prototype">
        <header class="stage__header">
          <div>
            <p class="eyebrow">CUTED timeline lab</p>
            <h1>Barra viva de corte</h1>
          </div>
          <div class="readout" aria-live="polite">
            <span id="trim-readout">00:00 - 01:12</span>
            <strong id="playhead-readout">00:18</strong>
          </div>
        </header>

        <div id="timeline-demo"></div>

        <footer class="legend" aria-label="Legenda da timeline">
          <span><i class="dot dot--blue"></i>Camera</span>
          <span><i class="dot dot--green"></i>Efeitos</span>
          <span><i class="line"></i>Waveform</span>
        </footer>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
